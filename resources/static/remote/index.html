<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Encore Link</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-color: #0a0a14;
        --bg-secondary: #141423;
        --primary: #89cff0;
        --secondary: #ffd700;
        --text: #ffffff;
        --text-dim: rgba(255, 255, 255, 0.6);
        --border: rgba(255, 255, 255, 0.15);
        --btn-bg: rgba(255, 255, 255, 0.05);
        --btn-active: rgba(137, 207, 240, 0.2);

        --radius: 12px;
        --header-height: 60px;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      /* --- Scrollbar Styling --- */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
      }

      body {
        font-family: "Rajdhani", sans-serif;
        background-color: var(--bg-color);
        color: var(--text);
        margin: 0;
        height: 100vh;
        width: 100vw;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* --- Main Layout --- */
      .app-container {
        display: flex;
        flex-direction: column;
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: relative;
      }

      /* --- Header --- */
      .app-header {
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: center;
        border-bottom: 1px solid var(--border);
        background: var(--bg-color);
        z-index: 10;
        flex-shrink: 0;
      }

      .app-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
        letter-spacing: 0.2rem;
        margin: 0;
        text-shadow: 0 0 10px rgba(137, 207, 240, 0.5);
      }

      /* --- View Handling --- */
      .view-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        width: 100%;
      }

      .view {
        position: absolute;
        inset: 0;
        background: var(--bg-color);
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #remote-view {
        z-index: 1;
      }

      #songlist-view {
        z-index: 2;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        visibility: hidden;
      }

      #songlist-view.active {
        transform: translateX(0);
        visibility: visible;
      }

      #search-view {
        z-index: 50;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        background: var(--bg-color);
        visibility: hidden;
      }

      #search-view.active {
        transform: translateY(0);
        visibility: visible;
      }

      /* --- Remote Controls --- */
      #remote-view-content {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .remote-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
        width: 100%;
        max-width: 400px;
        padding-bottom: 2rem;
      }

      .numpad-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      /* Wrapper for 2-column control groups (Key/Vol) */
      .controls-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .control-column {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      /* --- Buttons --- */
      button {
        font-family: "Rajdhani", sans-serif;
        background: var(--btn-bg);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: var(--radius);
        cursor: pointer;
        font-weight: 700;
        font-size: 1.2rem;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        user-select: none;
        height: 60px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        -webkit-tap-highlight-color: transparent;
      }

      button:active {
        transform: scale(0.96);
        background: var(--btn-active);
        border-color: var(--primary);
      }

      .btn-primary {
        background: var(--primary);
        color: var(--bg-color);
        border: none;
      }
      .btn-secondary {
        background: var(--secondary);
        color: var(--bg-color);
        border: none;
      }
      .btn-danger {
        color: #ff5555;
        border-color: rgba(255, 85, 85, 0.3);
      }

      .span-2 {
        grid-column: span 2;
      }
      .span-4 {
        grid-column: span 4;
      }

      .numpad-btn {
        font-size: 1.8rem;
        height: 70px;
        background: rgba(255, 255, 255, 0.02);
      }

      /* --- Library Styles --- */
      .library-header {
        padding: 0.75rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        gap: 0.5rem;
        background: var(--bg-secondary);
        flex-shrink: 0;
      }

      .search-bar {
        flex: 1;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: white;
        padding: 0.5rem 1rem;
        font-family: "Rajdhani";
        font-size: 1.1rem;
        outline: none;
      }
      .search-bar:focus {
        border-color: var(--primary);
      }

      .library-content {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        -webkit-overflow-scrolling: touch;
      }

      /* Artist List */
      .artist-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .artist-row {
        display: flex;
        align-items: center;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 0.8rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .artist-row:active {
        background: var(--btn-active);
      }

      .artist-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.9);
        margin-right: 1rem;
        flex-shrink: 0;
      }

      .artist-name-list {
        font-size: 1.1rem;
        font-weight: 600;
        color: white;
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .artist-count {
        font-size: 0.9rem;
        color: var(--text-dim);
      }

      /* Song List */
      #song-view-container {
        display: none;
        flex-direction: column;
      }
      #song-view-container.active {
        display: flex;
      }

      .song-item {
        display: flex;
        align-items: center;
        padding: 1rem 0.5rem;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
      }
      .song-item:active {
        background: var(--btn-active);
      }

      .song-code {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--primary);
        width: 60px;
        flex-shrink: 0;
      }
      .song-info {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .song-title {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 2px;
      }

      /* --- Toast --- */
      .toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translate(-50%, 100px);
        background: rgba(20, 20, 30, 0.95);
        border: 1px solid var(--primary);
        color: #fff;
        padding: 12px 24px;
        border-radius: 50px;
        font-weight: 700;
        opacity: 0;
        transition: all 0.3s;
        z-index: 9999;
      }
      .toast.show {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      /* =========================================
         TABLET & DESKTOP LAYOUT (Split Screen)
         ========================================= */
      @media (min-width: 768px) {
        .view-container {
          display: flex;
          flex-direction: row;
          width: 100%;
          height: 100%;
        }

        .app-header {
          display: none;
        }

        #remote-view {
          position: relative;
          width: 380px;
          flex-shrink: 0;
          border-right: 1px solid var(--border);
          transform: none;
          display: flex;
          z-index: 10;
        }

        .remote-title-desktop {
          display: block;
          text-align: center;
          font-size: 2.5rem;
          color: var(--primary);
          font-weight: 800;
          margin-bottom: 2rem;
          letter-spacing: 0.3rem;
          width: 100%;
        }

        #songlist-view {
          position: relative;
          flex: 1;
          transform: none !important;
          visibility: visible !important;
          display: flex;
          z-index: 5;
          border-left: none;
        }

        .mobile-only {
          display: none !important;
        }

        #unified-back-btn {
          display: none;
        }
        #unified-back-btn.desktop-visible {
          display: block;
        }

        button {
          font-size: 1.3rem;
          height: 70px;
        }
        .numpad-btn {
          height: 80px;
          font-size: 2.2rem;
        }
      }

      @media (max-width: 767px) {
        .remote-title-desktop {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <header class="app-header">
        <h1>ENCORE LINK</h1>
      </header>

      <div class="view-container">
        <!-- Remote Control Panel -->
        <div id="remote-view" class="view">
          <div id="remote-view-content">
            <div class="remote-title-desktop">ENCORE</div>

            <div class="remote-grid">
              <!-- Transport -->
              <button data-type="stop" data-value="Escape" class="btn-danger">
                STOP
              </button>
              <button
                data-type="reserve"
                data-value="Enter"
                class="btn-primary span-2"
              >
                RESERVE
              </button>
              <button data-type="toggle_bgv">BGV</button>

              <!-- Numpad -->
              <div class="numpad-grid" style="grid-column: span 4">
                <button class="numpad-btn" data-type="digit" data-value="1">
                  1
                </button>
                <button class="numpad-btn" data-type="digit" data-value="2">
                  2
                </button>
                <button class="numpad-btn" data-type="digit" data-value="3">
                  3
                </button>
                <button class="numpad-btn" data-type="digit" data-value="4">
                  4
                </button>
                <button class="numpad-btn" data-type="digit" data-value="5">
                  5
                </button>
                <button class="numpad-btn" data-type="digit" data-value="6">
                  6
                </button>
                <button class="numpad-btn" data-type="digit" data-value="7">
                  7
                </button>
                <button class="numpad-btn" data-type="digit" data-value="8">
                  8
                </button>
                <button class="numpad-btn" data-type="digit" data-value="9">
                  9
                </button>
                <button
                  class="numpad-btn"
                  data-type="backspace"
                  data-value="Backspace"
                >
                  &larr;
                </button>
                <button class="numpad-btn" data-type="digit" data-value="0">
                  0
                </button>
                <div></div>
              </div>

              <!-- Control Rows (Key on Left, Vol on Right) -->
              <div class="controls-wrapper span-4">
                <!-- Left Column: Key -->
                <div class="control-column">
                  <button data-type="key_up" data-value="ArrowUp">
                    KEY &uarr;
                  </button>
                  <button data-type="key_down" data-value="ArrowDown">
                    KEY &darr;
                  </button>
                </div>
                <!-- Right Column: Vol -->
                <div class="control-column">
                  <button data-type="vol_up" data-value="=">VOL &uarr;</button>
                  <button data-type="vol_down" data-value="-">
                    VOL &darr;
                  </button>
                </div>
              </div>

              <!-- Mobile Navigation -->
              <button
                class="btn-secondary span-4 mobile-only"
                id="open-library-btn"
              >
                BROWSE SONGLIST
              </button>

              <!-- YouTube Search -->
              <button
                data-type="yt_search"
                class="span-4"
                style="margin-top: 0.5rem"
              >
                YOUTUBE SEARCH
              </button>
            </div>
          </div>
        </div>

        <!-- Library Panel -->
        <div id="songlist-view" class="view">
          <div class="library-header">
            <button
              id="unified-back-btn"
              style="width: 50px; font-size: 1.5rem"
            >
              &larr;
            </button>
            <input
              type="text"
              id="library-search"
              class="search-bar"
              placeholder="Search songs or artists..."
            />
          </div>

          <div class="library-content">
            <div id="artist-view-container">
              <div class="artist-list" id="artist-list">
                <!-- JS Injected Artists -->
              </div>
            </div>

            <div id="song-view-container">
              <h3
                id="current-artist-name"
                style="margin: 0 0 1rem 0; color: var(--primary)"
              >
                Artist Name
              </h3>
              <div id="artist-songs-list">
                <!-- JS Injected Songs -->
              </div>
            </div>
          </div>
        </div>

        <!-- YouTube Search Overlay -->
        <div id="search-view">
          <div class="library-header">
            <button id="close-yt-btn" style="width: 50px">&larr;</button>
            <input
              type="text"
              id="yt-input"
              class="search-bar"
              placeholder="Search YouTube..."
            />
            <button id="yt-submit-btn" class="btn-primary" style="width: 60px">
              GO
            </button>
          </div>
          <div
            style="
              padding: 2rem;
              display: flex;
              flex-direction: column;
              gap: 1.5rem;
              height: 100%;
              max-width: 500px;
              margin: 0 auto;
              width: 100%;
              justify-content: center;
            "
          >
            <!-- Navigation Group (Stacked Top) -->
            <div style="display: flex; flex-direction: column; gap: 1rem">
              <button
                data-type="nav_up"
                data-value="ArrowUp"
                style="height: 80px; font-size: 2.5rem"
              >
                &uarr;
              </button>
              <button
                data-type="nav_down"
                data-value="ArrowDown"
                style="height: 80px; font-size: 2.5rem"
              >
                &darr;
              </button>
            </div>

            <!-- Action Group (Bottom, Distinct) -->
            <button
              data-type="enter"
              data-value="Enter"
              class="btn-primary"
              style="
                height: 100px;
                font-size: 1.5rem;
                font-weight: 800;
                letter-spacing: 2px;
              "
            >
              SELECT / PLAY
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">Song Reserved!</div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const socket = io({ query: { clientType: "remote" } });

        // --- State ---
        let fullSongList = [];
        let artistsMap = {};

        let navState = {
          view: "artists",
          mobileLibraryOpen: false,
        };

        // --- Elements ---
        const artistListContainer = document.getElementById("artist-list");
        const artistViewContainer = document.getElementById(
          "artist-view-container",
        );
        const songViewContainer = document.getElementById(
          "song-view-container",
        );
        const artistSongsList = document.getElementById("artist-songs-list");
        const currentArtistLabel = document.getElementById(
          "current-artist-name",
        );

        const librarySearch = document.getElementById("library-search");
        const unifiedBackBtn = document.getElementById("unified-back-btn");
        const songlistView = document.getElementById("songlist-view");

        const searchView = document.getElementById("search-view");

        // --- Socket Connection ---
        socket.on("connect", () => {
          console.log("Connected to Encore. Requesting song list...");
          socket.emit("remote-command", { type: "get_song_list", value: "" });
        });

        socket.on("fromRemote", (payload) => {
          if (payload.type === "songlist" && Array.isArray(payload.contents)) {
            fullSongList = payload.contents;
            processSongList(fullSongList);
          }
        });

        // --- Data Processing ---
        function processSongList(songs) {
          artistsMap = {};
          songs.forEach((song) => {
            const rawArtist = song.artist || "Unknown Artist";
            const artistKey = rawArtist.trim();
            if (!artistsMap[artistKey]) artistsMap[artistKey] = [];
            artistsMap[artistKey].push(song);
          });
          const sortedArtists = Object.keys(artistsMap).sort((a, b) =>
            a.localeCompare(b, undefined, { sensitivity: "base" }),
          );
          renderArtistList(sortedArtists);
        }

        // --- Rendering ---
        function renderArtistList(artists) {
          artistListContainer.innerHTML = "";
          if (artists.length === 0) {
            artistListContainer.innerHTML =
              '<div style="text-align: center; color: var(--text-dim); padding: 2rem;">No matches found.</div>';
            return;
          }
          const fragment = document.createDocumentFragment();
          artists.forEach((artist) => {
            const row = document.createElement("div");
            row.className = "artist-row";
            const color1 = stringToColor(artist);
            const color2 = stringToColor(artist.split("").reverse().join(""));
            const count = artistsMap[artist] ? artistsMap[artist].length : 0;

            row.innerHTML = `
                <div class="artist-avatar" style="background: linear-gradient(135deg, ${color1}, ${color2})">
                    ${artist.charAt(0).toUpperCase()}
                </div>
                <div class="artist-name-list">${artist}</div>
                <div class="artist-count">${count}</div>
            `;
            row.onclick = () => openArtistSongs(artist);
            fragment.appendChild(row);
          });
          artistListContainer.appendChild(fragment);
        }

        function openArtistSongs(artistName) {
          navState.view = "songs";
          currentArtistLabel.textContent = artistName;

          const songs = artistsMap[artistName] || [];
          artistSongsList.innerHTML = "";

          songs.forEach((song) => {
            const item = document.createElement("div");
            item.className = "song-item";
            item.innerHTML = `
                    <div class="song-code">${song.code}</div>
                    <div class="song-info"><div class="song-title">${song.title}</div></div>
                `;
            item.onclick = () => reserveSong(song);
            artistSongsList.appendChild(item);
          });

          // Switch DOM
          artistViewContainer.style.display = "none";
          songViewContainer.classList.add("active");

          // Update Inputs & Buttons
          librarySearch.value = "";
          librarySearch.placeholder = `Search in ${artistName}...`;

          // Update Back Button Visibility for Desktop
          unifiedBackBtn.classList.add("desktop-visible");
        }

        // --- Navigation Logic ---

        function handleBackNavigation() {
          // Case 1: We are looking at specific songs. Go back to Artist List.
          if (navState.view === "songs") {
            navState.view = "artists";
            artistViewContainer.style.display = "block";
            songViewContainer.classList.remove("active");

            librarySearch.placeholder = "Search songs or artists...";
            librarySearch.value = "";

            // Reset search results to full list
            const sortedArtists = Object.keys(artistsMap).sort((a, b) =>
              a.localeCompare(b, undefined, { sensitivity: "base" }),
            );
            renderArtistList(sortedArtists);

            // Hide back button on desktop (since we are at root)
            unifiedBackBtn.classList.remove("desktop-visible");
          }
          // Case 2: We are at Artist List. If mobile, close the library.
          else if (navState.view === "artists") {
            if (window.innerWidth < 768) {
              closeLibrary();
            } else {
              // Desktop: Do nothing or clear search
              librarySearch.value = "";
              const sorted = Object.keys(artistsMap).sort((a, b) =>
                a.localeCompare(b, undefined, { sensitivity: "base" }),
              );
              renderArtistList(sorted);
            }
          }
        }

        function openLibrary() {
          navState.mobileLibraryOpen = true;
          songlistView.classList.add("active");
        }

        function closeLibrary() {
          navState.mobileLibraryOpen = false;
          songlistView.classList.remove("active");
          if (navState.view === "songs") handleBackNavigation();
        }

        unifiedBackBtn.onclick = handleBackNavigation;
        document.getElementById("open-library-btn").onclick = openLibrary;

        // YT Search Logic
        document.querySelector('button[data-type="yt_search"]').onclick =
          () => {
            searchView.classList.add("active");
            document.getElementById("yt-input").focus();
            socket.emit("remote-command", { type: "yt_search_open" });
          };
        document.getElementById("close-yt-btn").onclick = () => {
          searchView.classList.remove("active");
          socket.emit("remote-command", { type: "yt_search_close" });
        };

        // --- Search Logic ---
        librarySearch.addEventListener("input", (e) => {
          const query = e.target.value.toLowerCase();

          if (navState.view === "artists") {
            const allArtists = Object.keys(artistsMap);
            if (!query) {
              renderArtistList(
                allArtists.sort((a, b) =>
                  a.localeCompare(b, undefined, { sensitivity: "base" }),
                ),
              );
            } else {
              const matchedArtists = new Set();

              allArtists.forEach((artist) => {
                if (artist.toLowerCase().includes(query))
                  matchedArtists.add(artist);
              });

              fullSongList.forEach((song) => {
                if (song.title && song.title.toLowerCase().includes(query)) {
                  const artistKey = song.artist.trim();
                  if (artistsMap[artistKey]) matchedArtists.add(artistKey);
                }
              });

              const results = Array.from(matchedArtists).sort((a, b) =>
                a.localeCompare(b, undefined, { sensitivity: "base" }),
              );
              renderArtistList(results);
            }
          } else {
            const songItems = artistSongsList.querySelectorAll(".song-item");
            songItems.forEach((item) => {
              const text = item.innerText.toLowerCase();
              item.style.display = text.includes(query) ? "flex" : "none";
            });
          }
        });

        // --- Command Logic ---
        function reserveSong(song) {
          socket.emit("remote-command", {
            type: "reserve_code",
            value: song.code,
          });
          showToast(`Reserved: ${song.title}`);
        }

        document.querySelectorAll("button[data-type]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const type = btn.dataset.type;
            const value = btn.dataset.value;
            if (type === "yt_search" && !btn.classList.contains("mobile-only"))
              return;
            socket.emit("remote-command", { type, value });
          });
        });

        document.getElementById("yt-submit-btn").onclick = () => {
          const query = document.getElementById("yt-input").value;
          if (query)
            socket.emit("remote-command", {
              type: "yt_search_query",
              value: query,
            });
        };

        // --- Helpers ---
        function stringToColor(str) {
          let hash = 0;
          for (let i = 0; i < str.length; i++)
            hash = str.charCodeAt(i) + ((hash << 5) - hash);
          const c = (hash & 0x00ffffff).toString(16).toUpperCase();
          return "#" + "00000".substring(0, 6 - c.length) + c;
        }

        let toastTimeout;
        function showToast(msg) {
          const toast = document.getElementById("toast");
          toast.textContent = msg;
          toast.classList.add("show");
          clearTimeout(toastTimeout);
          toastTimeout = setTimeout(() => toast.classList.remove("show"), 2500);
        }
      });
    </script>
  </body>
</html>

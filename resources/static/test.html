<!DOCTYPE html>
<html>
  <head>
    <title>Forte Sound Engine Client v1.1</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      body {
        font-family: sans-serif;
        background: #282a36;
        color: #f8f8f2;
        display: flex;
        gap: 40px;
      }
      .panel {
        padding: 10px;
        border: 1px solid #44475a;
        border-radius: 8px;
      }
      button {
        padding: 10px;
        margin: 5px;
        font-size: 1em;
        cursor: pointer;
      }
      select,
      input[type="number"] {
        padding: 5px;
        margin: 5px;
        font-size: 1em;
      }
      label {
        display: block;
        margin-top: 10px;
      }
      #status {
        font-weight: bold;
      }
      .control-group {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="panel">
      <h1>Forte Sound Engine Control</h1>
      <p>Status: <span id="status">Disconnected</span></p>

      <div class="control-group">
        <button id="startBtn">Start Engine</button>
        <button id="stopBtn">Stop Engine</button>
      </div>
      <hr />
      <div class="control-group">
        <h2>Audio Configuration</h2>
        <label for="inputDevice">Input Device:</label>
        <select id="inputDevice"></select>

        <label for="outputDevice">Output Device:</label>
        <select id="outputDevice"></select>

        <label for="bufferSize">Buffer Size:</label>
        <input type="number" id="bufferSize" value="1024" step="128" />

        <button id="applySettingsBtn">Apply Settings</button>
        <p>
          <small>Note: Applying settings will restart the audio engine.</small>
        </p>
      </div>
    </div>

    <div class="panel">
      <h2>Effect Presets & Controls</h2>
      <div class="control-group">
        <button id="setVocalPreset">Set "Standard Vocal" Preset</button>
        <button onclick="clearEffects()">Clear All Effects</button>
      </div>
      <div class="control-group">
        <label for="reverb">Reverb Wet Level (Live):</label>
        <input
          type="range"
          id="reverb"
          min="0"
          max="1"
          step="0.01"
          value="0.2"
          oninput="updateReverb(this.value)"
        />
      </div>
    </div>

    <script>
      const socket = io("ws://localhost:8765");
      const statusEl = document.getElementById("status");
      const inputDeviceSelect = document.getElementById("inputDevice");
      const outputDeviceSelect = document.getElementById("outputDevice");
      const bufferSizeInput = document.getElementById("bufferSize");

      socket.on("connect", () => {
        statusEl.textContent = "Connected";
        statusEl.style.color = "#50fa7b";
      });

      socket.on("disconnect", () => {
        statusEl.textContent = "Disconnected";
        statusEl.style.color = "#ff5555";
      });

      // This event now drives the UI state
      socket.on("engine_status", (data) => {
        console.log("Engine status update:", data);
        statusEl.textContent = data.running
          ? "Engine Running"
          : "Engine Stopped";
        // Update UI to reflect current server config
        if (data.config) {
          if (data.config.input_device)
            inputDeviceSelect.value = data.config.input_device;
          if (data.config.output_device)
            outputDeviceSelect.value = data.config.output_device;
          if (data.config.buffer_size)
            bufferSizeInput.value = data.config.buffer_size;
        }
      });

      // This event populates our dropdowns
      socket.on("audio_devices", (data) => {
        console.log("Received audio devices:", data);

        inputDeviceSelect.innerHTML = "";
        data.inputs.forEach((device) => {
          const option = document.createElement("option");
          option.value = device;
          option.textContent = device;
          inputDeviceSelect.appendChild(option);
        });

        outputDeviceSelect.innerHTML = "";
        data.outputs.forEach((device) => {
          const option = document.createElement("option");
          option.value = device;
          option.textContent = device;
          outputDeviceSelect.appendChild(option);
        });
      });

      socket.on("success", (data) => console.log("SUCCESS:", data.message));
      socket.on("error", (data) => {
        console.error("ERROR:", data.message);
        alert("Error from engine: " + data.message);
      });

      // The "Start" button now uses the selected settings from the UI
      document.getElementById("startBtn").onclick = () => {
        console.log("Sending start_engine command...");
        // First, we set the desired config...
        const settings = {
          input_device: inputDeviceSelect.value,
          output_device: outputDeviceSelect.value,
          buffer_size: parseInt(bufferSizeInput.value, 10),
        };
        socket.emit("change_settings", settings);

        // Then, we send the start command.
        // A slight delay might be needed if the state change is not instant.
        setTimeout(() => socket.emit("start_engine", {}), 100);
      };

      document.getElementById("stopBtn").onclick = () => {
        console.log("Sending stop_engine command...");
        socket.emit("stop_engine", {});
      };

      document.getElementById("applySettingsBtn").onclick = () => {
        const settings = {
          input_device: inputDeviceSelect.value,
          output_device: outputDeviceSelect.value,
          buffer_size: parseInt(bufferSizeInput.value, 10),
        };
        console.log("Applying new settings:", settings);
        socket.emit("change_settings", settings);
      };

      document.getElementById("setVocalPreset").onclick = () => {
        const effects = [
          { plugin: "NoiseGate", params: { threshold_db: -35 } },
          { plugin: "HighpassFilter", params: { cutoff_frequency_hz: 100 } },
          { plugin: "Gain", params: { gain_db: 5.0 } },
          { plugin: "Compressor", params: { threshold_db: -18, ratio: 3.5 } },
          { plugin: "Gain", params: { gain_db: 3.0 } },
          {
            plugin: "HighShelfFilter",
            params: { cutoff_frequency_hz: 4438, gain_db: 2.4 },
          },
          { plugin: "Reverb", params: { room_size: 0.7, wet_level: 0.15 } },
          {
            plugin: "PeakFilter",
            params: { cutoff_frequency_hz: 676, gain_db: -2.5 },
          },
        ];
        socket.emit("set_effects", effects);
      };

      function updateReverb(value) {
        socket.emit("update_effect", {
          index: 6,
          params: { wet_level: parseFloat(value) },
        });
      }

      function clearEffects() {
        socket.emit("set_effects", []);
      }
    </script>
  </body>
</html>
